name: Pipeline

on:
  push:
  workflow_dispatch:
    inputs:
      additional_docker_tag:
        description: Additional docker tag that can be used to specify stable or testing tags
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_build.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2.10.1
    secrets: inherit
    with:
      install_command: 'npm run setup'

  unit_tests:
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_unit_tests.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2.10.1
    needs: build

  integration_tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm_build_artifacts
      - uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ./node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-build-node-modules-${{ hashFiles('**/package-lock.json', '!**/node_modules/**') }}
      - name: npm ci
        run: |
          npm ci --no-audit
          npx cypress install
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm_build_artifacts
          path: |
            build/
            dist/
            assets/stylesheets/
      - name: Start service
        run: |
          cp .env.example .env
          npm run start:dev &
          timeout 10 sh -c 'until curl -s localhost:3000; do sleep 1; done'
      - name: Run tests
        run: npm run int-test
      - if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: npm_integration_test_artifacts
          path: |
            integration-tests/videos/
            integration_tests/screenshots/

  helm_lint:
    strategy:
      matrix:
        environment: [dev, preprod, prod]
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/test_helm_lint.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2.10.1
    secrets:
      HMPPS_SRE_SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
    with:
      environment: ${{ matrix.environment }}

  docker_build:
    if: github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/docker_build.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2.10.1
    with:
      docker_registry: 'ghcr.io'
      registry_org: 'ministryofjustice'
      additional_docker_tag: ${{ inputs.additional_docker_tag }}
      push: true
      docker_multiplatform: true

  deploy_dev:
    name: Deploy to dev
    needs:
      - docker_build
      - integration_tests
      - unit_tests
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2.10.1
    secrets: inherit
    with:
      environment: dev
      app_version: ${{ needs.docker_build.outputs.app_version }}

  deploy_preprod:
   name: Deploy to preprod
   needs:
     - docker_build
     - integration_tests
     - unit_tests
   uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2.10.1
   secrets: inherit
   with:
     environment: preprod
     app_version: ${{ needs.docker_build.outputs.app_version }}

  deploy_prod:
   name: Deploy to prod
   needs:
     - docker_build
     - deploy_dev
     - deploy_preprod
   uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2.10.1
   secrets: inherit
   with:
     environment: prod
     app_version: ${{ needs.docker_build.outputs.app_version }}
